<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Semplice</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
    /* STILE ISPIRATO A W3SCHOOLS */
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f1f1f1;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background-color: white;
        padding: 20px;
        box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
        border-radius: 5px;
    }

    h1, h2 {
        color: #333;
        border-bottom: 2px solid #04AA6D;
        padding-bottom: 5px;
    }

    /* Stile Form e Input */
    input[type=text], input[type=email], input[type=password], input[type=file] {
        width: 100%;
        padding: 12px 20px;
        margin: 8px 0;
        display: inline-block;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* Stile Bottoni */
    button {
        background-color: #04AA6D;
        color: white;
        padding: 14px 20px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background-color: #059862;
    }

    .btn-danger {
        background-color: #f44336;
        padding: 8px 12px;
        font-size: 14px;
    }

    .btn-danger:hover {
        background-color: #da190b;
    }

    /* Stile "Card" per i prodotti */
    .card {
        box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
        transition: 0.3s;
        border-radius: 5px;
        padding: 16px;
        margin-bottom: 16px;
        background-color: #fff;
        border-left: 5px solid #04AA6D;
    }

    .card:hover {
        box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
    }

    /* Stile lista carrello */
    ul {
        list-style-type: none;
        padding: 0;
    }

    ul li {
        background: #eee;
        margin: 5px 0;
        padding: 10px;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Negozio Online</h1>

    <h2>Carica Catalogo</h2>
    <input type="file" id="fileInput" accept=".csv">

    <h2>Registrazione</h2>
    <input type="text" id="nome" placeholder="Il tuo Nome">
    <input type="email" id="email" placeholder="La tua Email">
    <input type="password" id="password" placeholder="Scegli una Password">
    <button onclick="registrati()">Registrati</button>
    <button onclick="logout()" style="background-color: #555;">Logout</button>

    <h2>Prodotti</h2>
    <div id="prodotti">
        <p><i>Carica un file CSV per visualizzare i prodotti.</i></p>
    </div>

    <h2>Carrello</h2>
    <ul id="carrello"></ul>
    <button onclick="completaAcquisto()">Completa Acquisto</button>
    <button onclick="generaPDF()" style="background-color: #2196F3;">Scarica PDF Ordine</button>
</div>

<script>
let prodotti = [];
let carrello = [];
let utenteRegistrato = null;

// LETTURA CSV
document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        const testo = event.target.result;
        const righe = testo.split("\n");

        prodotti = [];

        for (let i = 1; i < righe.length; i++) {
            let colonne = righe[i].split(",");
            if (colonne.length < 4) continue;

            let prodotto = {
                tipo: colonne[0].trim(),
                nome: colonne[1].trim(),
                descrizione: colonne[2].trim(),
                prezzo: colonne[3].trim()
            };

            prodotti.push(prodotto);
        }

        mostraProdotti();
    };

    reader.readAsText(file);
});

// MOSTRA PRODOTTI
function mostraProdotti() {
    const container = document.getElementById("prodotti");
    container.innerHTML = "";

    if (prodotti.length === 0) {
        container.innerHTML = "<p>Nessun prodotto trovato.</p>";
        return;
    }

    prodotti.forEach((p, index) => {
        container.innerHTML += `
            <div class="card">
                <h3>${p.nome}</h3>
                <p><strong>Tipo:</strong> ${p.tipo}</p>
                <p>${p.descrizione}</p>
                <p><strong>Prezzo:</strong> €${p.prezzo}</p>
                <button onclick="aggiungiCarrello(${index})">Aggiungi al carrello</button>
            </div>
        `;
    });
}

// REGISTRAZIONE
function registrati() {
    let nome = document.getElementById("nome").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if (nome === "" || email === "" || password === "") {
        alert("Per favore, compila tutti i campi!");
        return;
    }

    utenteRegistrato = {
        nome: nome,
        email: email,
        password: password
    };

    alert(`Benvenuto, ${nome}! Registrazione completata.`);
}

// LOGOUT
function logout() {
    if (!utenteRegistrato) {
        alert("Nessun utente loggato.");
        return;
    }
    utenteRegistrato = null;
    carrello = [];
    aggiornaCarrello();
    
    document.getElementById("nome").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    
    alert("Logout effettuato con successo!");
}

// AGGIUNGI AL CARRELLO
function aggiungiCarrello(index) {
    if (!utenteRegistrato) {
        alert("Devi registrarti prima di poter acquistare!");
        return;
    }

    carrello.push(prodotti[index]);
    aggiornaCarrello();
}

// RIMUOVI DAL CARRELLO
function rimuoviDalCarrello(index) {
    carrello.splice(index, 1);
    aggiornaCarrello();
}

// AGGIORNA CARRELLO
function aggiornaCarrello() {
    const lista = document.getElementById("carrello");
    lista.innerHTML = "";

    if (carrello.length === 0) {
        lista.innerHTML = "<li>Il tuo carrello è vuoto.</li>";
        return;
    }

    carrello.forEach((p, index) => {
        lista.innerHTML += `
            <li>
                <span>${p.nome} - <strong>€${p.prezzo}</strong></span>
                <button class="btn-danger" onclick="rimuoviDalCarrello(${index})">Rimuovi</button>
            </li>
        `;
    });
}

// COMPLETA ACQUISTO
function completaAcquisto() {
    if (!utenteRegistrato) {
        alert("Registrati prima per completare l'acquisto!");
        return;
    }

    if (carrello.length === 0) {
        alert("Il tuo carrello è vuoto!");
        return;
    }

    alert(`Acquisto completato con successo da ${utenteRegistrato.nome}! Grazie per il tuo ordine.`);

    carrello = [];
    aggiornaCarrello();
}

// GENERA PDF
function generaPDF() {
    if (!utenteRegistrato) {
        alert("Registrati prima per generare il PDF!");
        return;
    }
    
    if (carrello.length === 0) {
        alert("Aggiungi qualcosa al carrello prima di scaricare il PDF.");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Riepilogo Ordine - Negozio Semplice", 10, 20);
    
    doc.setFontSize(12);
    doc.text("Nome Cliente: " + utenteRegistrato.nome, 10, 35);
    doc.text("Email: " + utenteRegistrato.email, 10, 42);

    doc.text("Prodotti Acquistati:", 10, 55);
    
    let y = 65;
    let totale = 0;

    carrello.forEach(p => {
        doc.text(`- ${p.nome}: €${p.prezzo}`, 15, y);
        
        // Fix per leggere sia i prezzi con il punto (10.50) che con la virgola (10,50)
        let prezzoPulito = p.prezzo.replace(',', '.');
        totale += parseFloat(prezzoPulito) || 0; 
        
        y += 10;
    });

    doc.line(10, y, 200, y); 
    doc.setFont(undefined, 'bold');
    doc.text(`Totale Stimato: €${totale.toFixed(2)}`, 10, y + 10);

    doc.save("ordine_shop.pdf");
}
</script>

</body>
</html>
