<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica 2.0 - Oggetto Persona</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: left;
        }

        .card h2 {
            text-align: center;
            color: #4e73df;
        }

        .dato {
            margin: 8px 0;
            font-size: 16px;
        }

        .label {
            font-weight: bold;
            color: #333;
        }

        .valore {
            color: #555;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Anagrafica Persona</h2>
        <div id="output"></div>
    </div>

    <script>
        // Oggetto persona (collection)
        let persona = {
            nome: "Gino",
            cognome: "Latilla",
            eta: 35,
            citta: "Roma",
            professione: "Impiegato"
        };

        // Lettura con struttura puntata
        let risultato =
            "<div class='dato'><span class='label'>Nome:</span> <span class='valore'>" + persona.nome + "</span></div>" +
            "<div class='dato'><span class='label'>Cognome:</span> <span class='valore'>" + persona.cognome + "</span></div>" +
            "<div class='dato'><span class='label'>Età:</span> <span class='valore'>" + persona.eta + "</span></div>" +
            "<div class='dato'><span class='label'>Città:</span> <span class='valore'>" + persona.citta + "</span></div>" +
            "<div class='dato'><span class='label'>Professione:</span> <span class='valore'>" + persona.professione + "</span></div>";

        document.getElementById("output").innerHTML = risultato;

        // Test console
        console.log(persona.nome); // "Gino"
    </script>

</body>
</html>
